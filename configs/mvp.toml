scenario_id = "synthetic-baseline"

[mvp]
ticks = 400
snapshot_every_ticks = 4
settlement_count = 10
base_population = 100
seed = 42

[mvp.climate]
pdsi_min = -6.0
pdsi_max = 6.0
ar1_phi = 0.65
noise_std = 0.55
cycle1_years = 18.0
cycle1_amp = 1.1
cycle2_years = 55.0
cycle2_amp = 0.8
shock_chance_per_year = 0.04
shock_mean = -1.8
shock_duration_years_min = 2
shock_duration_years_max = 7

[mvp.storage]
sigma_seed = 0.12
spoilage_rate = 0.05
allow_seed_draw = true
enable_emergency_reciprocity = true

[mvp.threat]
drought_weight = 0.5
conflict_weight = 0.3
food_weight = 0.2
defensibility_cost_k = 0.8

[mvp.culture]
neutral_drift_rate = 0.02
conformist_strength = 0.06
prestige_rate = 0.08
jitter_scale = 0.01
max_trait_step_per_tick = 0.15

[mvp.validation_outputs]
enable_trait_deposition = false
enable_network_snapshot = false
deposition_rate_per_tick = 0.01
network_min_weight = 0.20

[mvp.mechanisms]
seed_tax_storage = true
threat_defensibility = true
cultural_transmission = true
water_quality_disease_coupling = true

[mvp.metrics]
enable_baseline_metrics = true
aggregation_threshold = 200
network_min_weight = 0.20

[mvp.demography]
use_life_table_default = true
life_table_csv_path = "input/neolithicdemographytable.csv"

[mvp.spatial]
hex_diameter_km = 1.0
flat_travel_km_per_day = 36.0

[mvp.gui]
live_update_every_ticks = 0

[mvp.resources]
yield_multiplier = 1.0
stores_multiplier = 1.0

[coupling.stress_weights]
food = 0.30
water = 0.25
fuel = 0.15
disease = 0.15
conflict = 0.15

[coupling.interaction_weights]
drought_x_disease = 0.08
drought_x_conflict = 0.08
water_x_disease = 0.10
fuel_x_labor = 0.06

[sweep]
enabled = false
snapshot_every = 1
knockout_variants = ["none"]

[sweep.fit_scoring]
enabled = true

[sweep.fit_scoring.targets]
population_total = 3000.0
aggregation_count = 5.0
network_density = 0.25
mean_stress = 0.45

[sweep.fit_scoring.weights]
population = 0.35
aggregation = 0.25
network_density = 0.20
stress = 0.20

[sweep.fit_scoring.scales]
population = 1500.0
aggregation = 3.0
network_density = 0.20
stress = 0.20

[sweep.seed_policy]
type = "incremental"
start = 1000

[sweep.ranges]
sigma_seed_values = [0.08, 0.12, 0.16]
defensibility_cost_values = [0.4, 0.8, 1.2]
prestige_rate_values = [0.04, 0.08, 0.12]
